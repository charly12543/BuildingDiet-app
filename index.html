<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas-app</title>
<link rel="stylesheet" href="style.css">

<script>
 if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}
</script>  
</head>

<body>

<!-- NAVBAR -->  
<nav class="navbar">
<div class="nav-container">
<a href="index.html" class="logo">
<img src="images/logoGitHub.png">
</a>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul class="nav-links" id="navLinks">
<button onclick="logout()" class="btn-delete">Salir</button>  
<li><a href="planes.html" class="btn-main">🥗 Planes</a></li>
</ul>
</div>
</nav>  

<!-- HERO -->    
<section class="hero">
  <h1 id="tituloModo">🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>

  <h3>
    <button onclick="limpiarCliente()" class="btn-delete">❌ Nuevo cliente</button>
  </h3>
</section>

<!-- CALCULADORA -->   
<section>
<div class="calculadora">

  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>🔥 Nivel del cliente</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7">

  <label>💊 Toma proteína en polvo</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>

</div>
</section>


 <script>
const API = "http://localhost:8080/api";

/* ===================== EDIT MODE AUTOLOAD ===================== */
document.addEventListener("DOMContentLoaded", async () => {

  let cliente = JSON.parse(localStorage.getItem("clienteEditar") || "{}");
  let planId = localStorage.getItem("planEditarId");
  let rutinaId = localStorage.getItem("rutinaEditarId");

  if(cliente.nombre){
    Object.keys(cliente).forEach(k=>{
      if(document.getElementById(k)){
        document.getElementById(k).value = cliente[k];
      }
    });
  }

  if(planId){
    document.getElementById("tituloModo").innerText = "✏️ Editando dieta";

    let res = await fetch(`${API}/planes/${planId}`);
    let data = await res.json();

    document.getElementById("resultadoPRO").innerHTML = data.html;
  }

  if(rutinaId){
    document.getElementById("tituloModo").innerText = "✏️ Editando rutina";

    let res = await fetch(`${API}/rutinas/${rutinaId}`);
    let data = await res.json();

    document.getElementById("resultadoPRO").innerHTML = data.rutinaHtml;
  }

});


/* ===================== GENERAR DIETA PRO (TUYA COMPLETA) ===================== */
function generarDietaPRO(datos){

  let {nombre, peso, altura, edad, objetivo, sexo, nivel, tomaWhey, fase} = datos;

  if(altura > 3) altura = altura / 100;
  if(!fase) fase = Math.floor(Math.random()*4)+1;

  let esNino = edad < 14;
  let esMujerVolumen = (sexo==="mujer" && objetivo==="volumen");

  let imc = peso / (altura * altura);
  let tipoFisico = "fit";

  if(imc >= 35) tipoFisico = "obesidad_severa";
  else if(imc >= 30) tipoFisico = "obesidad";
  else if(imc >= 25) tipoFisico = "sobrepeso";

  let bmr = 10*peso + 6.25*(altura*100) - 5*edad + (sexo==="mujer"?-161:5);
  let calorias = Math.round(bmr * 1.5);

  if(fase===2) calorias -= 100;
  if(fase===3) calorias -= 200;
  if(fase===4) calorias += (objetivo==="volumen"?300:-100);

  if(tipoFisico==="obesidad_severa") calorias -= 900;
  else if(tipoFisico==="obesidad") calorias -= 700;
  else if(tipoFisico==="sobrepeso") calorias -= 400;

  if(esMujerVolumen) calorias += 150;

  let proteFactor = 2.2;
  if(sexo==="mujer") proteFactor = 1.8;
  if(esNino) proteFactor = 1.2;

  if(nivel==="competidor"){
    proteFactor = 2.5;
    if(fase>=3) proteFactor = 2.8;
    if(fase===4) proteFactor = 3;
  }

  if(esMujerVolumen) proteFactor = 1.7;

  let proteina = Math.round(peso * proteFactor);
  let grasa = Math.round((calorias * 0.25)/9);
  let carbos = Math.round((calorias - (proteina*4 + grasa*9)) / 4);

  let comidas = [];

  function random(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

  function proteFuente(){
    return `<ul>
      <li>Pollo</li>
      <li>Carne</li>
      <li>Pescado</li>
      <li>Atún</li>
      <li>Huevos</li>
    </ul>`;
  }

  comidas.push({nombre:"Desayuno", proteina:"Huevos", carbos:"Pan", grasa:"Almendras"});
  comidas.push({nombre:"Comida", proteina:proteFuente(), carbos:"Arroz", grasa:"Aguacate"});
  comidas.push({nombre:"Cena", proteina:proteFuente(), carbos:"Ligero", grasa:"Aguacate"});

  return {
    titulo:`🔥 Dieta PRO (${nombre}) – Fase ${fase}`,
    clienteInfo:{nombre,edad,peso,altura,sexo,nivel,objetivo,fase},
    calorias:`${calorias} kcal`,
    proteina:`${proteina} g`,
    carbos:`${carbos} g`,
    grasa:`${grasa} g`,
    comidas
  };
}


/* ===================== MOSTRAR DIETA (🔥 CLAVE) ===================== */
function mostrarDieta(d){

  let html = `
  <div class="dieta-card">
    <h2>${d.titulo}</h2>

    <p>🔥 Calorías: ${d.calorias}</p>
    <p>🥩 Proteína: ${d.proteina}</p>
    <p>🍚 Carbos: ${d.carbos}</p>
    <p>🥑 Grasas: ${d.grasa}</p>

    ${d.comidas.map(c=>`
      <div class="card-meal">
        <h4>${c.nombre}</h4>
        <p>${c.proteina}</p>
        <p>${c.carbos}</p>
        <p>${c.grasa}</p>
      </div>
    `).join("")}
  </div>
  `;

  document.getElementById("resultadoPRO").innerHTML = html;
}


/* ===================== GENERAR RUTINA REAL ===================== */
function generarRutina(){

  let dias = parseInt(document.getElementById("diasGym").value) || 4;

  let html = `
  <div class="dieta-card">
    <h2>🏋️ Rutina PRO</h2>
    <p>${dias} días por semana</p>

    <ul>
      <li>Día 1: Pecho + tríceps</li>
      <li>Día 2: Espalda + bíceps</li>
      <li>Día 3: Pierna</li>
      <li>Día 4: Hombro</li>
    </ul>
  </div>
  `;

  document.getElementById("resultadoPRO").innerHTML = html;

  guardarRutinaBackend();
}


/* ===================== USAR PRO (🔥 FIX PRINCIPAL) ===================== */
function usarPro(){

  let datos = {
    nombre: document.getElementById("nombreCliente").value,
    peso: parseFloat(document.getElementById("peso").value),
    altura: parseFloat(document.getElementById("altura").value),
    edad: parseFloat(document.getElementById("edad").value),
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value,
    tomaWhey: document.getElementById("tomaWhey").value==="true",
    diasGym: parseInt(document.getElementById("diasGym").value) || 0
  };

  if(!datos.peso || !datos.altura || !datos.edad){
    alert("Completa todos los datos bro 🔥");
    return;
  }

  let dieta = generarDietaPRO(datos);

  mostrarDieta(dieta);

  guardarPlanBackend(datos, dieta);
}


/* ===================== GUARDAR PLAN BACKEND (🔥 FIX TOTAL) ===================== */
async function guardarPlanBackend(datos, dieta){

  let html = document.getElementById("resultadoPRO").innerHTML;

  let planId = localStorage.getItem("planEditarId");

  let url = API + "/guardar-plan";
  let method = "POST";

  if(planId){
    url = API + "/planes/" + planId;
    method = "PUT";
  }

  await fetch(url,{
    method:method,
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      cliente: datos,
      dieta: dieta,
      html: html
    })
  });

  localStorage.removeItem("planEditarId");
}


/* ===================== GUARDAR RUTINA ===================== */
async function guardarRutinaBackend(){

  let html = document.getElementById("resultadoPRO").innerHTML;

  let rutinaId = localStorage.getItem("rutinaEditarId");

  let url = API + "/guardar-rutina";
  let method = "POST";

  if(rutinaId){
    url = API + "/rutinas/" + rutinaId;
    method = "PUT";
  }

  await fetch(url,{
    method:method,
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      cliente:{ nombre: document.getElementById("nombreCliente").value },
      rutinaHtml: html
    })
  });

  localStorage.removeItem("rutinaEditarId");
}


/* ===================== LIMPIAR (🔥 FIX) ===================== */
function limpiarCliente(){
  localStorage.removeItem("clienteEditar");
  localStorage.removeItem("planEditarId");
  localStorage.removeItem("rutinaEditarId");
  location.reload();
}

/* ===================== LOGOUT ===================== */
function logout(){
  localStorage.removeItem("token");
  window.location.href="login.html";
}
</script>

</body>
</html>
