<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas-app</title>
<link rel="stylesheet" href="style.css">

<script>
 if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}
</script>  
</head>

<body>

<!-- NAVBAR -->  
<nav class="navbar">
<div class="nav-container">
<a href="index.html" class="logo">
<img src="images/logoGitHub.png">
</a>

<div class="menu-toggle" onclick="toggleMenu()">☰</div>

<ul class="nav-links" id="navLinks">
<button onclick="logout()" class="btn-delete">Salir</button>  
<li><a href="planes.html" class="btn-main">🥗 Planes</a></li>
</ul>
</div>
</nav>  

<!-- HERO -->    
<section class="hero">
  <h1 id="tituloModo">🔥 Calculadora PRO (Privada)</h1>
  <p>Genera dieta + rutina personalizada</p>

  <h3>
    <button onclick="limpiarCliente()" style="margin-top:10px; background:#999;">
      ❌ Nuevo cliente
    </button>
  </h3>
</section>

<!-- CALCULADORA -->   
<section>
<div class="calculadora">

  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura (1.80 o 180)">
  <input type="number" id="edad" placeholder="Edad">

  <label>🧍 Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>🎯 Objetivo</label>  
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>🔥 Nivel del cliente</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>📅 Días por semana</label>
  <input type="number" id="diasGym" min="2" max="7">

  <label>💊 Toma proteína en polvo</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta PRO</button>
  <button onclick="generarRutina()" style="margin-top:10px;">🏋️ Generar Rutina PRO</button>

  <div id="resultadoPRO"></div>

</div>
</section>


 <script>
const API = "http://localhost:8080/api";

/* ===================== EDIT MODE AUTOLOAD ===================== */
document.addEventListener("DOMContentLoaded", async () => {

  let cliente = JSON.parse(localStorage.getItem("clienteEditar") || "{}");
  let planId = localStorage.getItem("planEditarId");
  let rutinaId = localStorage.getItem("rutinaEditarId");

  if(cliente.nombre){
    document.getElementById("nombreCliente").value = cliente.nombre;
    document.getElementById("peso").value = cliente.peso;
    document.getElementById("altura").value = cliente.altura;
    document.getElementById("edad").value = cliente.edad;
    document.getElementById("sexo").value = cliente.sexo;
    document.getElementById("objetivo").value = cliente.objetivo;
    document.getElementById("nivel").value = cliente.nivel;
    document.getElementById("diasGym").value = cliente.diasGym;
    document.getElementById("tomaWhey").value = cliente.tomaWhey ? "true":"false";
  }

  // EDITANDO DIETA
  if(planId){
    document.getElementById("tituloModo").innerText = "✏️ Editando dieta";

    let res = await fetch(`${API}/planes/${planId}`);
    let data = await res.json();

    document.getElementById("resultadoPRO").innerHTML = data.html;
  }

  // EDITANDO RUTINA
  if(rutinaId){
    document.getElementById("tituloModo").innerText = "✏️ Editando rutina";

    let res = await fetch(`${API}/rutinas/${rutinaId}`);
    let data = await res.json();

    document.getElementById("resultadoPRO").innerHTML = data.rutinaHtml;
  }

});

/* ===================== GET CLIENTE COMPLETO ===================== */
function getClienteData(){
  return {
    nombre: document.getElementById("nombreCliente").value,
    peso: parseFloat(document.getElementById("peso").value) || 0,
    altura: parseFloat(document.getElementById("altura").value) || 0,
    edad: parseInt(document.getElementById("edad").value) || 0,
    sexo: document.getElementById("sexo").value,
    objetivo: document.getElementById("objetivo").value,
    nivel: document.getElementById("nivel").value,
    diasGym: parseInt(document.getElementById("diasGym").value) || 3,
    tomaWhey: document.getElementById("tomaWhey").value === "true"
  };
}

/* ===================== GENERAR DIETA ===================== */
function usarPro(){
  let cliente = getClienteData();

  let html = `
  <div class="dieta-card">
    <h2>${cliente.nombre}</h2>
    <p>Dieta generada correctamente 🔥</p>
  </div>`;

  document.getElementById("resultadoPRO").innerHTML = html;

  guardarPlanBackend(cliente, html);
}

/* ===================== GENERAR RUTINA ===================== */
function generarRutina(){
  let cliente = getClienteData();

  let html = `
  <div class="dieta-card">
    <h2>🏋️ Rutina PRO</h2>
    <p>${cliente.diasGym} días por semana</p>
  </div>`;

  document.getElementById("resultadoPRO").innerHTML = html;

  guardarRutinaBackend(cliente, html);
}

/* ===================== SAVE PLAN ===================== */
async function guardarPlanBackend(cliente, html){

  let planId = localStorage.getItem("planEditarId");

  let url = API + "/guardar-plan";
  let method = "POST";

  if(planId){
    url = API + "/planes/" + planId;
    method = "PUT";
  }

  await fetch(url,{
    method:method,
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      cliente,
      html,
      dieta:{
        calorias:"2000 kcal",
        proteina:"150 g",
        carbos:"200 g",
        grasa:"60 g",
        clienteInfo:{ fase:1 }
      }
    })
  });

  localStorage.removeItem("planEditarId");
}

/* ===================== SAVE RUTINA ===================== */
async function guardarRutinaBackend(cliente, html){

  let rutinaId = localStorage.getItem("rutinaEditarId");

  let url = API + "/guardar-rutina";
  let method = "POST";

  if(rutinaId){
    url = API + "/rutinas/" + rutinaId;
    method = "PUT";
  }

  await fetch(url,{
    method:method,
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      cliente,
      rutinaHtml:html
    })
  });

  localStorage.removeItem("rutinaEditarId");
}

/* ===================== LOGOUT ===================== */
function logout(){
  localStorage.removeItem("token");
  window.location.href="login.html";
}

/* ===================== LIMPIAR CLIENTE ===================== */
function limpiarCliente(){
  localStorage.removeItem("clienteEditar");
  localStorage.removeItem("planEditarId");
  localStorage.removeItem("rutinaEditarId");
  location.reload();
}
</script>

</body>
</html>
