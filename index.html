<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dietas-app</title>
<link rel="stylesheet" href="style.css">

<script>
 if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}
</script>  
</head>
<body>

<!-- NAVBAR -->  
<nav class="navbar">
  <div class="nav-container">

    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png" alt="logo">
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
      <li><a href="planes.html" onclick="cerrarMenu()">📋 Planes</a></li>
      <li id="usuarioNav"></li>
      <li><button onclick="logout()" class="btn-delete">🚪 Salir</button></li>
    </ul>

  </div>
</nav>

<div class="nav-overlay" id="navOverlay" onclick="cerrarMenu()"></div>

<!-- HERO -->
<section class="hero" style="background: linear-gradient(135deg, #000000, #1a1a1a); color: white; text-align: center; padding: 70px 20px; border-bottom: 2px solid #d4af37;">
  <h1 style="font-size: 2.8rem; color: #d4af37;">💎 Charly Fitness PRO</h1>
  <p>Plataforma inteligente para dietas y rutinas</p>
</section>

<!-- CALCULADORA -->
<section>
<div class="calculadora">

  <input type="text" id="nombreCliente" placeholder="Nombre del cliente">
  <input type="text" id="telefonoCliente" placeholder="Teléfono cliente (Ej: 5217771234567)">
  <input type="number" id="peso" placeholder="Peso (kg)">
  <input type="number" step="0.01" id="altura" placeholder="Altura">
  <input type="number" id="edad" placeholder="Edad">

  <label>Sexo</label>
  <select id="sexo">
    <option value="hombre">Hombre</option>
    <option value="mujer">Mujer</option>
  </select>

  <label>Objetivo</label>
  <select id="objetivo">
    <option value="definicion">Definición</option>
    <option value="volumen">Volumen</option>
  </select>

  <label>Nivel</label>
  <select id="nivel">
    <option value="novato">Novato</option>
    <option value="intermedio">Intermedio</option>
    <option value="avanzado">Avanzado</option>
    <option value="competidor">Competidor</option>
  </select>

  <label>Días</label>
  <input type="number" id="diasGym">

  <label>Whey</label>
  <select id="tomaWhey">
    <option value="true">Sí</option>
    <option value="false">No</option>
  </select>

  <button onclick="usarPro()">🔥 Generar Dieta</button>
  <button onclick="generarRutina()">🏋️ Rutina</button>

  <button onclick="descargarPDF('dieta')">📄 PDF Dieta</button>
  <button onclick="descargarPDF('rutina')">📄 PDF Rutina</button>

  <div id="resultadoPRO"></div>
  <div id="resultadoRutina" style="display:none;"></div>

</div>
</section>

<!-- WHATS -->
<div class="whats-box">
  <h3>Enviar al cliente</h3>
  <button onclick="enviarWhats()" class="btn-whats-pro">
    📲 Enviar por WhatsApp
  </button>
</div>

<script>
/* ===================== WHATS PRO ===================== */
function enviarWhats(){

  let telefono = document.getElementById("telefonoCliente").value.trim();
  let nombre = document.getElementById("nombreCliente").value || "cliente";

  if(!telefono){
    alert("⚠️ Ingresa el número del cliente bro");
    return;
  }

  telefono = telefono.replace(/\D/g, "");

  if(telefono.length === 10){
    telefono = "521" + telefono;
  }

  let mensaje = `🔥 Hola ${nombre}!

Te acabo de enviar tu plan personalizado 💎

📌 Incluye:
✔ Dieta
✔ Rutina
✔ Recomendaciones

⚠️ IMPORTANTE:
Te envío los PDFs en este chat 👇`;

  let url = `https://wa.me/${telefono}?text=${encodeURIComponent(mensaje)}`;

  window.open(url, "_blank");

  alert("📲 WhatsApp abierto — adjunta los PDFs bro 🔥");
}
</script>

<script>
/* ===================== MENU ===================== */
function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}
function cerrarMenu(){
  document.getElementById("navLinks").classList.remove("active");
}
function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}
</script>

</body>
</html>
