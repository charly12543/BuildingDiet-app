<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planes - Charly Fitness</title>
  <link rel="stylesheet" href="style.css">
  <script>
  if(!localStorage.getItem("token")){
    window.location.href = "login.html";
  }
  </script>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>
    <ul class="nav-links">
       <li><a href="index.html" class="btn-main">🥗 Inicio</a></li>     
       <button onclick="logout()" class="btn-delete">Salir</button>
    </ul>
  </div>
</nav> 

<section class="hero">
  <h1>📋 Panel de Planes</h1>
</section>

<div class="tabs">
  <button onclick="mostrarDietas()" id="btnDietas" class="tab-activo">📋 Dietas</button>
  <button onclick="mostrarRutinas()" id="btnRutinas">🏋️ Rutinas</button>
</div>

<div class="busqueda-box">
  <input type="text" id="busqueda" placeholder="Buscar">
  <button onclick="buscar()">🔍</button>
</div>

<section>

<div id="seccion-dietas">
  <h2>📋 Dietas</h2>
  <div id="contenedor-planes"></div>
</div>

<div id="seccion-rutinas" style="display:none;">
  <h2>🏋️ Rutinas</h2>
  <div id="contenedor-rutinas"></div>
</div>

<h2>👁️ Visor</h2>
<div id="visor" class="visor-box"></div>

<button onclick="exportarPDF()" class="btn-ver">
  📄 Exportar PDF
</button>

</section>

<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const API = "http://localhost:8080/api";

let paginaActual = 0;
let totalPaginas = 0;
let vistaActual = "dietas";

/* ===================== TABS ===================== */
function mostrarDietas(){
    vistaActual = "dietas";
    paginaActual = 0;

    document.getElementById("seccion-dietas").style.display="block";
    document.getElementById("seccion-rutinas").style.display="none";

    cargarPlanes();
}

function mostrarRutinas(){
    vistaActual = "rutinas";
    paginaActual = 0;

    document.getElementById("seccion-dietas").style.display="none";
    document.getElementById("seccion-rutinas").style.display="block";

    cargarRutinas();
}

/* ===================== PLANES ===================== */
async function cargarPlanes(page = 0){
    const res = await fetch(`${API}/planes?page=${page}&size=5`);
    const data = await res.json();

    totalPaginas = data.totalPages;

    const contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    data.content.forEach(plan => {
        contenedor.innerHTML += `
        <div class="dieta-card">
            <h3>${plan.cliente?.nombre}</h3>
            <p>${plan.fecha}</p>

            <button onclick="verPlan(${plan.id})">👁 Ver</button>
            <button onclick="editarPlan(${plan.id})">✏️ Editar</button>
            <button onclick="eliminarPlan(${plan.id})">🗑</button>
        </div>`;
    });

    actualizarPaginaUI();
}

/* ===================== RUTINAS ===================== */
async function cargarRutinas(page = 0){
    const res = await fetch(`${API}/rutinas?page=${page}&size=5`);
    const data = await res.json();

    totalPaginas = data.totalPages;

    const contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    data.content.forEach(r => {
        contenedor.innerHTML += `
        <div class="dieta-card">
            <h3>${r.cliente?.nombre}</h3>

            <button onclick="verRutina(${r.id})">👁 Ver</button>
            <button onclick="editarRutina(${r.id})">✏️ Editar</button>
            <button onclick="eliminarRutina(${r.id})">🗑</button>
        </div>`;
    });

    actualizarPaginaUI();
}

/* ===================== VER ===================== */
async function verPlan(id){
    const res = await fetch(`${API}/planes/${id}`);
    const data = await res.json();

    document.getElementById("visor").innerHTML = data.html;
}

async function verRutina(id){
    const res = await fetch(`${API}/rutinas/${id}`);
    const data = await res.json();

    document.getElementById("visor").innerHTML = data.rutinaHtml;
}

/* ===================== EDITAR ===================== */
async function editarPlan(id){
    const res = await fetch(`${API}/planes/${id}`);
    const data = await res.json();

    localStorage.setItem("planEditarId", data.id);
    localStorage.setItem("clienteEditar", JSON.stringify(data.cliente));
    localStorage.setItem("modoEdicion", "true");

    window.location.href = "index.html";
}

async function editarRutina(id){
    const res = await fetch(`${API}/rutinas/${id}`);
    const data = await res.json();

    localStorage.setItem("rutinaEditarId", data.id);
    localStorage.setItem("clienteEditar", JSON.stringify(data.cliente));
    localStorage.setItem("modoEdicion", "true");

    window.location.href = "index.html";
}

/* ===================== DELETE ===================== */
async function eliminarPlan(id){
    await fetch(`${API}/planes/${id}`, {method:"DELETE"});
    cargarPlanes();
}

async function eliminarRutina(id){
    await fetch(`${API}/rutinas/${id}`, {method:"DELETE"});
    cargarRutinas();
}

/* ===================== BUSCAR ===================== */
async function buscar(){
    let q = document.getElementById("busqueda").value;

    if(vistaActual === "dietas"){
        const res = await fetch(`${API}/planes/buscar?q=${q}`);
        const data = await res.json();

        let contenedor = document.getElementById("contenedor-planes");
        contenedor.innerHTML = "";

        data.forEach(p=>{
            contenedor.innerHTML += `
            <div class="dieta-card">
                <h3>${p.cliente?.nombre}</h3>
                <button onclick="verPlan(${p.id})">Ver</button>
            </div>`;
        });
    }
}

/* ===================== PAGINACION ===================== */
function paginaSiguiente(){
    if(paginaActual < totalPaginas-1){
        paginaActual++;
        vistaActual==="dietas" ? cargarPlanes(paginaActual) : cargarRutinas(paginaActual);
    }
}

function paginaAnterior(){
    if(paginaActual > 0){
        paginaActual--;
        vistaActual==="dietas" ? cargarPlanes(paginaActual) : cargarRutinas(paginaActual);
    }
}

function actualizarPaginaUI(){
    document.getElementById("pagina-info").innerText =
        `Página ${paginaActual + 1}`;
}

/* ===================== PDF ===================== */
async function exportarPDF(){
    const { jsPDF } = window.jspdf;
    const elemento = document.getElementById("visor");

    const canvas = await html2canvas(elemento);
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF();
    pdf.addImage(img, 'PNG', 10, 10, 180, 250);
    pdf.save("plan.pdf");
}

/* ===================== INIT ===================== */
mostrarDietas();

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

</script>

</body>
</html>
