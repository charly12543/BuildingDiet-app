<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Planes - Charly Fitness</title>
<link rel="stylesheet" href="style.css">

<script>
if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}
</script>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>

    <ul class="nav-links">
      <li><a href="index.html">🏠 Inicio</a></li>
      <button onclick="logout()" class="btn-delete">Salir</button>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1>📋 Panel de Planes</h1>
</section>

<!-- TABS -->
<div class="tabs">
  <button onclick="mostrarDietas()" id="btnDietas" class="tab-btn active">📋 Dietas</button>
  <button onclick="mostrarRutinas()" id="btnRutinas" class="tab-btn">🏋️ Rutinas</button>
</div>

<!-- BUSCADOR -->
<div class="busqueda-box">
  <input type="text" id="busqueda" placeholder="Buscar cliente...">
  <button onclick="buscar()">🔍</button>
</div>

<section>

<div id="seccion-dietas">
  <div id="contenedor-planes"></div>
</div>

<div id="seccion-rutinas" style="display:none;">
  <div id="contenedor-rutinas"></div>
</div>

<h2>👁️ Visor</h2>
<div id="visor" class="visor-box"></div>

<button onclick="exportarPDF()" class="btn-ver">
📄 Exportar PDF
</button>

</section>

<!-- PAGINACION -->
<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>

const API = "http://localhost:8080/api";

let paginaActual = 0;
let totalPaginas = 0;
let vistaActual = "dietas";

/* ===================== TABS ===================== */
function activarTab(activo){
  document.getElementById("btnDietas").classList.remove("active");
  document.getElementById("btnRutinas").classList.remove("active");

  activo.classList.add("active");
}

function mostrarDietas(){
  vistaActual = "dietas";
  paginaActual = 0;

  activarTab(document.getElementById("btnDietas"));

  document.getElementById("seccion-dietas").style.display="block";
  document.getElementById("seccion-rutinas").style.display="none";

  // 🔥 FIX
  document.getElementById("visor").innerHTML = "";

  cargarPlanes();
}

function mostrarRutinas(){
  vistaActual = "rutinas";
  paginaActual = 0;

  activarTab(document.getElementById("btnRutinas"));

  document.getElementById("seccion-dietas").style.display="none";
  document.getElementById("seccion-rutinas").style.display="block";

  // 🔥 FIX
  document.getElementById("visor").innerHTML = "";

  cargarRutinas();
}
/* ===================== PLANES ===================== */
async function cargarPlanes(page = 0){

  try{

    const res = await fetch(`${API}/planes?page=${page}&size=5`);

    if(!res.ok){
      const text = await res.text();
      console.error("❌ ERROR BACK:", text);
      document.getElementById("contenedor-planes").innerHTML =
        "<p>❌ Error cargando planes</p>";
      return;
    }

    const data = await res.json();

    console.log("🔥 PLANES RESPONSE:", data);

    totalPaginas = data.totalPages || 0;

    const contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    if(!data.content || data.content.length === 0){
      contenedor.innerHTML = "<p>⚠ No hay planes registrados</p>";
      return;
    }

    data.content.forEach(plan => {
      contenedor.innerHTML += `
      <div class="dieta-card">
        <h3>${plan.cliente?.nombre || "Sin nombre"}</h3>
        <p>${plan.fecha || ""}</p>

        <div class="acciones">
          <button class="btn-ver" onclick="verPlan(${plan.id})">👁 Ver</button>
          <button class="btn-ver" onclick="editarPlan(${plan.id})">✏️ Editar</button>
          <button class="btn-delete" onclick="eliminarPlan(${plan.id})">🗑</button>
        </div>
      </div>`;
    });

    actualizarPaginaUI();

  } catch(error){
    console.error("❌ ERROR FETCH:", error);
    document.getElementById("contenedor-planes").innerHTML =
      "<p>❌ Error de conexión</p>";
  }
}

/* ===================== RUTINAS ===================== */
async function cargarRutinas(page = 0){

  try{

    const res = await fetch(`${API}/rutinas?page=${page}&size=5`);

    if(!res.ok){
      const text = await res.text();
      console.error("❌ ERROR BACK:", text);
      document.getElementById("contenedor-rutinas").innerHTML =
        "<p>❌ Error cargando rutinas</p>";
      return;
    }

    const data = await res.json();

    console.log("🔥 RUTINAS RESPONSE:", data);

    totalPaginas = data.totalPages || 0;

    const contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    if(!data.content || data.content.length === 0){
      contenedor.innerHTML = "<p>⚠ No hay rutinas registradas</p>";
      return;
    }

    data.content.forEach(r => {
      contenedor.innerHTML += `
      <div class="dieta-card">
        <h3>${r.cliente?.nombre || "Sin nombre"}</h3>

        <div class="acciones">
          <button class="btn-ver" onclick="verRutina(${r.id})">👁 Ver</button>
          <button class="btn-ver" onclick="editarRutina(${r.id})">✏️ Editar</button>
          <button class="btn-delete" onclick="eliminarRutina(${r.id})">🗑</button>
        </div>
      </div>`;
    });

    actualizarPaginaUI();

  } catch(error){
    console.error("❌ ERROR FETCH:", error);
    document.getElementById("contenedor-rutinas").innerHTML =
      "<p>❌ Error de conexión</p>";
  }
}

/* ===================== VER ===================== */
async function verPlan(id){
  const res = await fetch(`${API}/planes/${id}`);
  const data = await res.json();

  document.getElementById("visor").innerHTML = data.html || "<p>❌ No hay dieta</p>";
}

async function verRutina(id){
  const res = await fetch(`${API}/rutinas/${id}`);
  const data = await res.json();

  document.getElementById("visor").innerHTML = data.rutinaHtml || "<p>❌ No hay rutina</p>";
}

/* ===================== EDIT ===================== */
async function editarPlan(id){
  const res = await fetch(`${API}/planes/${id}`);
  const data = await res.json();

  localStorage.setItem("planEditarId", data.id);
  localStorage.setItem("clienteEditar", JSON.stringify(data.cliente));

  window.location.href = "index.html";
}

async function editarRutina(id){
  const res = await fetch(`${API}/rutinas/${id}`);
  const data = await res.json();

  localStorage.setItem("rutinaEditarId", data.id);
  localStorage.setItem("clienteEditar", JSON.stringify(data.cliente));

  window.location.href = "index.html";
}

/* ===================== DELETE ===================== */
async function eliminarPlan(id){
  if(!confirm("¿Seguro que quieres eliminar este plan?")) return;

  await fetch(`${API}/planes/${id}`, {method:"DELETE"});
  cargarPlanes();
}

async function eliminarRutina(id){
  if(!confirm("¿Seguro que quieres eliminar esta rutina?")) return;

  await fetch(`${API}/rutinas/${id}`, {method:"DELETE"});
  cargarRutinas();
}

/* ===================== BUSCAR ===================== */
async function buscar(){
  let q = document.getElementById("busqueda").value;

  if(vistaActual === "dietas"){
    const res = await fetch(`${API}/planes/buscar?q=${q}`);
    const data = await res.json();

    let contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    data.forEach(p=>{
      contenedor.innerHTML += `
      <div class="dieta-card">
        <h3>${p.cliente?.nombre}</h3>
        <button class="btn-ver" onclick="verPlan(${p.id})">Ver</button>
      </div>`;
    });

  } else {
    const res = await fetch(`${API}/rutinas?page=0&size=50`);
    const data = await res.json();

    let contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    data.content
      .filter(r => r.cliente?.nombre?.toLowerCase().includes(q.toLowerCase()))
      .forEach(r=>{
        contenedor.innerHTML += `
        <div class="dieta-card">
          <h3>${r.cliente?.nombre}</h3>
          <button class="btn-ver" onclick="verRutina(${r.id})">Ver</button>
        </div>`;
      });
  }
}

/* ===================== PAGINACION ===================== */
function paginaSiguiente(){
  if(paginaActual < totalPaginas-1){
    paginaActual++;
    vistaActual==="dietas" ? cargarPlanes(paginaActual) : cargarRutinas(paginaActual);
  }
}

function paginaAnterior(){
  if(paginaActual > 0){
    paginaActual--;
    vistaActual==="dietas" ? cargarPlanes(paginaActual) : cargarRutinas(paginaActual);
  }
}

function actualizarPaginaUI(){
  document.getElementById("pagina-info").innerText =
    `Página ${paginaActual + 1}`;
}

/* ===================== PDF ===================== */
async function exportarPDF(){

  const { jsPDF } = window.jspdf;
  const elemento = document.getElementById("visor");

  if(!elemento.innerHTML.trim()){
    alert("Primero visualiza algo bro 🔥");
    return;
  }

  // 🔥 CLON LIMPIO
  let clon = elemento.cloneNode(true);

  clon.style.background = "#ffffff";
  clon.style.color = "#000";
  clon.style.padding = "20px";
  clon.style.width = "800px";
  clon.style.boxSizing = "border-box";
  clon.style.position = "absolute";
  clon.style.left = "-9999px";

  // 🔥 eliminar sombras pesadas
  clon.querySelectorAll("*").forEach(el => {
    el.style.boxShadow = "none";
    el.style.textShadow = "none";
  });

  // 🔥 quitar emojis (rompen PDF)
  clon.innerHTML = clon.innerHTML.replace(/[\u{1F300}-\u{1F6FF}]/gu, "");

  document.body.appendChild(clon);

  const canvas = await html2canvas(clon, {
    scale: 2,
    useCORS: true,
    backgroundColor: "#ffffff"
  });

  document.body.removeChild(clon);

  const pdf = new jsPDF("p", "mm", "a4");

  const pageWidth = 210;
  const pageHeight = 297;

  const margin = 10;
  const usableWidth = pageWidth - margin * 2;

  const imgWidth = usableWidth;
  const imgHeight = (canvas.height * imgWidth) / canvas.width;

  let position = 0;

  while(position < imgHeight){

    if(position > 0){
      pdf.addPage();
    }

    pdf.addImage(
      canvas,
      "PNG",
      margin,
      10 - position,
      imgWidth,
      imgHeight
    );

    position += pageHeight;
  }

  pdf.save("plan.pdf");
}
/* INIT */
mostrarDietas();

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

</script>

</body>
</html>
