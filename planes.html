<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planes - Charly Fitness</title>
  <link rel="stylesheet" href="style.css">
  <script>
  if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}
</script>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>
    <ul class="nav-links">
       <li><a href="index.html" class="btn-main">🥗 Inicio</a></li>     
       <button onclick="logout()" class="btn-delete">Salir</button>
    </ul>
  </div>
</nav> 

<!-- HERO -->
<section class="hero">
  <h1>📋 Panel de Planes</h1>
  <p>Administra dietas y rutinas de forma profesional</p>
</section>

<!-- 🔥 TABS -->
<div class="tabs">
  <button onclick="mostrarDietas()" id="btnDietas" class="tab-activo">📋 Dietas</button>
  <button onclick="mostrarRutinas()" id="btnRutinas">🏋️ Rutinas</button>
</div>

<!-- 🔍 BUSQUEDA -->
<div class="busqueda-box">
  <input type="text" id="busqueda" placeholder="Buscar por ID o nombre">
  <button onclick="buscar()">🔍 Buscar</button>
</div>

<section>

<!-- 📋 DIETAS -->
<div id="seccion-dietas">
  <h2>📋 Dietas</h2>
  <div id="contenedor-planes"></div>
</div>

<!-- 🏋️ RUTINAS -->
<div id="seccion-rutinas" style="display:none;">
  <h2>🏋️ Rutinas</h2>
  <div id="contenedor-rutinas"></div>
</div>

<!-- 👁 VISOR -->
<h2 style="margin-top:40px;">👁️ Visor</h2>
<div id="visor" class="visor-box">
  Selecciona un plan o rutina
</div>

<!-- 📄 EXPORTAR -->
<button onclick="exportarPDF()" class="btn-ver" style="margin-top:20px;">
  📄 Exportar PDF
</button>

</section>

<!-- PAGINACION -->
<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<!-- LIBRERIAS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const API = "http://localhost:8080/api";

let paginaActual = 0;
let totalPaginas = 0;
let vistaActual = "dietas";

/* ===================== TABS ===================== */
function mostrarDietas(){
    vistaActual = "dietas";

    document.getElementById("seccion-dietas").style.display="block";
    document.getElementById("seccion-rutinas").style.display="none";

    document.getElementById("btnDietas").classList.add("tab-activo");
    document.getElementById("btnRutinas").classList.remove("tab-activo");

    cargarPlanes(paginaActual);
}

function mostrarRutinas(){
    vistaActual = "rutinas";

    document.getElementById("seccion-dietas").style.display="none";
    document.getElementById("seccion-rutinas").style.display="block";

    document.getElementById("btnRutinas").classList.add("tab-activo");
    document.getElementById("btnDietas").classList.remove("tab-activo");

    cargarRutinas(paginaActual);
}

/* ===================== PLANES ===================== */
async function cargarPlanes(page = 0){
    const res = await fetch(`${API}/planes?page=${page}&size=5`);
    const data = await res.json();

    totalPaginas = data.totalPages;

    const contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    data.content.forEach(plan => {
        contenedor.innerHTML += `
        <div class="dieta-card">
            <h3 style="color:#d4af37;">${plan.cliente?.nombre || "Sin nombre"}</h3>
            <p>📅 ${plan.fecha}</p>

            <div class="acciones">
                <button onclick="verPlan(${plan.id})" class="btn-ver">👁 Ver</button>
                <button onclick="eliminarPlan(${plan.id})" class="btn-delete">🗑 Eliminar</button>
            </div>
        </div>`;
    });

    actualizarPaginaUI();
}

/* ===================== RUTINAS ===================== */
async function cargarRutinas(page = 0){
    const res = await fetch(`${API}/rutinas?page=${page}&size=5`);
    const data = await res.json();

    totalPaginas = data.totalPages;

    const contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    data.content.forEach(rutina => {
        contenedor.innerHTML += `
        <div class="dieta-card">
            <h3 style="color:#4dd0e1;">${rutina.cliente?.nombre || "Sin nombre"}</h3>
            <p>🏋️ ${rutina.cliente?.diasGym || '-'} días</p>

            <div class="acciones">
                <button onclick="verRutina(${rutina.id})" class="btn-ver">👁 Ver</button>
                <button onclick="eliminarRutina(${rutina.id})" class="btn-delete">🗑 Eliminar</button>
            </div>
        </div>`;
    });

    actualizarPaginaUI();
}

/* ===================== VER ===================== */
async function verPlan(id){
    const res = await fetch(`${API}/planes/${id}`);
    const data = await res.json();
    document.getElementById("visor").innerHTML = data.html;
}

async function verRutina(id){
    const res = await fetch(`${API}/rutinas/${id}`);
    const data = await res.json();
    document.getElementById("visor").innerHTML = data.rutinaHtml;
}

/* ===================== ELIMINAR ===================== */
async function eliminarPlan(id){
    if(!confirm("¿Eliminar plan?")) return;
    await fetch(`${API}/planes/${id}`, {method:"DELETE"});
    cargarPlanes(paginaActual);
}

async function eliminarRutina(id){
    if(!confirm("¿Eliminar rutina?")) return;
    await fetch(`${API}/rutinas/${id}`, {method:"DELETE"});
    cargarRutinas(paginaActual);
}

/* ===================== BUSCAR ===================== */
async function buscar(){
    let q = document.getElementById("busqueda").value;

    if(q === ""){
        if(vistaActual === "dietas") cargarPlanes();
        else cargarRutinas();
        return;
    }

    if(vistaActual === "dietas"){
        const res = await fetch(`${API}/planes/buscar?q=${q}`);
        const data = await res.json();

        const contenedor = document.getElementById("contenedor-planes");
        contenedor.innerHTML = "";

        data.forEach(plan => {
            contenedor.innerHTML += `
            <div class="dieta-card">
                <h3>${plan.cliente?.nombre}</h3>
                <button onclick="verPlan(${plan.id})" class="btn-ver">Ver</button>
            </div>`;
        });
    } else {
        alert("Búsqueda de rutinas por ID en desarrollo 🔥");
    }
}

/* ===================== PAGINACION ===================== */
function paginaSiguiente(){
    paginaActual++;
    if(vistaActual === "dietas") cargarPlanes(paginaActual);
    else cargarRutinas(paginaActual);
}

function paginaAnterior(){
    if(paginaActual > 0){
        paginaActual--;
        if(vistaActual === "dietas") cargarPlanes(paginaActual);
        else cargarRutinas(paginaActual);
    }
}

function actualizarPaginaUI(){
    document.getElementById("pagina-info").innerText =
        `Página ${paginaActual + 1}`;
}

/* ===================== PDF ===================== */
async function exportarPDF(){
    const { jsPDF } = window.jspdf;
    const elemento = document.getElementById("visor");

    if(!elemento.innerText.trim()){
        alert("Nada que exportar bro 🔥");
        return;
    }

    const canvas = await html2canvas(elemento, {scale:2});
    const img = canvas.toDataURL("image/png");

    const pdf = new jsPDF();
    const width = 190;
    const height = canvas.height * width / canvas.width;

    pdf.addImage(img, 'PNG', 10, 10, width, height);
    pdf.save("plan.pdf");
}

/* ===================== INIT ===================== */
async function init(){
    mostrarDietas();
}

init();

/* ENTER BUSCAR */
document.getElementById("busqueda")
.addEventListener("keypress", e=>{
    if(e.key==="Enter") buscar();
});

/* Log-Out */
function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}  
</script>

</body>
</html>
