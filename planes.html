<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel - Charly Fitness</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>
  </div>
</nav>

<section class="hero">
  <h1>📋 Panel Profesional</h1>
  <p>Gestión de dietas y rutinas</p>
</section>

<!-- 🔥 TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="cambiarTab('dietas')">🥗 Dietas</button>
  <button class="tab-btn" onclick="cambiarTab('rutinas')">🏋️ Rutinas</button>
</div>

<!-- 🔍 FILTROS -->
<div class="filtros-box">
  <input type="text" id="busqueda" placeholder="Buscar cliente...">
  
  <select id="orden" onchange="ordenar()">
    <option value="asc">Nombre A-Z</option>
    <option value="desc">Nombre Z-A</option>
  </select>

  <button onclick="exportarPDF()">📄 Exportar</button>
</div>

<section>

<!-- DIETAS -->
<div id="tab-dietas">
  <div id="contenedor-dietas"></div>
</div>

<!-- RUTINAS -->
<div id="tab-rutinas" style="display:none;">
  <div id="contenedor-rutinas"></div>
</div>

<h2>👁️ Visor</h2>
<div id="visor" class="visor-box">
Selecciona un plan o rutina
</div>

</section>

<!-- PAGINACION -->
<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script>
const API = "http://localhost:8080/api";

let paginaActual = 0;
let totalPaginasDietas = 0;
let totalPaginasRutinas = 0;
let tabActual = "dietas";

let listaDietas = [];
let listaRutinas = [];

/* ================= TAB ================= */
function cambiarTab(tab){
  tabActual = tab;

  document.getElementById("tab-dietas").style.display =
    tab === "dietas" ? "block" : "none";

  document.getElementById("tab-rutinas").style.display =
    tab === "rutinas" ? "block" : "none";

  document.querySelectorAll(".tab-btn")
    .forEach(btn => btn.classList.remove("active"));

  event.target.classList.add("active");

  paginaActual = 0;

  if(tab === "dietas"){
    cargarDietas();
  }else{
    cargarRutinas();
  }
}

/* ================= DIETAS ================= */
async function cargarDietas(){
  const res = await fetch(`${API}/planes?page=${paginaActual}&size=10`);
  const data = await res.json();

  listaDietas = data.content;
  totalPaginasDietas = data.totalPages;

  renderDietas(listaDietas);
}

/* ================= RUTINAS ================= */
async function cargarRutinas(){
  const res = await fetch(`${API}/rutinas?page=${paginaActual}&size=10`);
  const data = await res.json();

  listaRutinas = data.content;
  totalPaginasRutinas = data.totalPages;

  renderRutinas(listaRutinas);
}

/* ================= RENDER ================= */
function renderDietas(lista){
  const c = document.getElementById("contenedor-dietas");
  c.innerHTML = "";

  lista.forEach(p => {
    c.innerHTML += `
      <div class="dieta-card">
        <h3 style="color:#d4af37;">${p.cliente?.nombre}</h3>
        <button onclick="verPlan(${p.id})" class="btn-ver">Ver</button>
      </div>`;
  });

  actualizarPaginaUI();
}

function renderRutinas(lista){
  const c = document.getElementById("contenedor-rutinas");
  c.innerHTML = "";

  lista.forEach(r => {
    c.innerHTML += `
      <div class="dieta-card">
        <h3 style="color:#4dd0e1;">${r.cliente?.nombre}</h3>
        <button onclick="verRutina(${r.id})" class="btn-ver">Ver rutina</button>
      </div>`;
  });

  actualizarPaginaUI();
}

/* ================= VER ================= */
async function verPlan(id){
  const res = await fetch(`${API}/planes/${id}`);
  const plan = await res.json();
  document.getElementById("visor").innerHTML = plan.html;
}

async function verRutina(id){
  const res = await fetch(`${API}/rutinas/${id}`);
  const rutina = await res.json();
  document.getElementById("visor").innerHTML =
    rutina.rutinaHtml || "Sin rutina";
}

/* ================= BUSCAR ================= */
document.getElementById("busqueda").addEventListener("input", function(){
  let q = this.value.toLowerCase();

  if(tabActual === "dietas"){
    let filtrado = listaDietas.filter(p =>
      p.cliente?.nombre?.toLowerCase().includes(q)
    );
    renderDietas(filtrado);
  }else{
    let filtrado = listaRutinas.filter(r =>
      r.cliente?.nombre?.toLowerCase().includes(q)
    );
    renderRutinas(filtrado);
  }
});

/* ================= ORDEN ================= */
function ordenar(){
  let tipo = document.getElementById("orden").value;

  if(tabActual === "dietas"){
    listaDietas.sort((a,b)=>{
      let n1 = a.cliente?.nombre || "";
      let n2 = b.cliente?.nombre || "";
      return tipo==="asc"?n1.localeCompare(n2):n2.localeCompare(n1);
    });
    renderDietas(listaDietas);
  }else{
    listaRutinas.sort((a,b)=>{
      let n1 = a.cliente?.nombre || "";
      let n2 = b.cliente?.nombre || "";
      return tipo==="asc"?n1.localeCompare(n2):n2.localeCompare(n1);
    });
    renderRutinas(listaRutinas);
  }
}

/* ================= PDF ================= */
async function exportarPDF(){
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();

  let lista = tabActual === "dietas" ? listaDietas : listaRutinas;

  let y = 10;
  pdf.text("Clientes Charly Fitness", 10, y);

  y += 10;

  lista.forEach((item,i)=>{
    let nombre = item.cliente?.nombre || "Sin nombre";
    pdf.text(`${i+1}. ${nombre}`, 10, y);
    y+=6;

    if(y>280){
      pdf.addPage();
      y=10;
    }
  });

  pdf.save("clientes.pdf");
}

/* ================= PAGINACION ================= */
function paginaSiguiente(){
  if(tabActual === "dietas"){
    if(paginaActual < totalPaginasDietas-1){
      paginaActual++;
      cargarDietas();
    }
  }else{
    if(paginaActual < totalPaginasRutinas-1){
      paginaActual++;
      cargarRutinas();
    }
  }
}

function paginaAnterior(){
  if(paginaActual>0){
    paginaActual--;
    tabActual==="dietas"?cargarDietas():cargarRutinas();
  }
}

function actualizarPaginaUI(){
  document.getElementById("pagina-info").innerText =
    `Página ${paginaActual+1}`;
}

/* INIT */
cargarDietas();
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

</body>
</html>
