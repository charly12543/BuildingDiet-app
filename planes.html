<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planes - Charly Fitness</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>
    <div class="menu-toggle">☰</div>
    <ul class="nav-links">
       <li><a href="index.html" class="btn-main">🥗 Inicio</a></li>     
    </ul>
  </div>
</nav> 

<section class="hero">
  <h1>📋 Planes y Rutinas</h1>
  <p>Administra todo en un solo lugar</p>
</section>

<!-- 🔍 BUSQUEDA -->
<div class="busqueda-box">
  <input type="text" id="busqueda" placeholder="Buscar por ID o nombre">
  <button onclick="buscar()">🔍 Buscar</button>
</div>

<section>
  <h2>📊 Resultados</h2>
  <div id="contenedor-global"></div>

  <h2>👁️ Visor</h2>
  <div id="visor" class="visor-box">
    Selecciona un plan o rutina
  </div>
</section>

<!-- PAGINACION -->
<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script>
const API = "http://localhost:8080/api";

let paginaActual = 0;
let totalPaginas = 0;

/* ===================== CARGAR TODO ===================== */
async function cargarTodo(page = 0){

    const [planesRes, rutinasRes] = await Promise.all([
        fetch(`${API}/planes?page=${page}&size=5`),
        fetch(`${API}/rutinas?page=${page}&size=5`)
    ]);

    const planesData = await planesRes.json();
    const rutinasData = await rutinasRes.json();

    totalPaginas = Math.max(planesData.totalPages, rutinasData.totalPages);

    const contenedor = document.getElementById("contenedor-global");
    contenedor.innerHTML = "";

    /* 🔥 PLANES */
    planesData.content.forEach(plan => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3 style="color:#d4af37;">📋 ${plan.cliente?.nombre || "Sin nombre"}</h3>
                <p>📅 ${plan.fecha}</p>

                <div>
                    🔥 ${plan.calorias || '-'} |
                    🥩 ${plan.proteina || '-'} |
                    🍚 ${plan.carbos || '-'} |
                    🥑 ${plan.grasa || '-'}
                </div>

                <div class="acciones">
                    <button onclick="verPlan(${plan.id})" class="btn-ver">👁 Ver</button>
                    <button onclick="eliminarPlan(${plan.id})" class="btn-delete">🗑 Eliminar</button>
                </div>
            </div>
        `;
    });

    /* 🔥 RUTINAS */
    rutinasData.content.forEach(rutina => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3 style="color:#4dd0e1;">🏋️ ${rutina.cliente?.nombre || "Sin nombre"}</h3>
                <p>💪 ${rutina.cliente?.diasGym || '-'} días</p>

                <div class="acciones">
                    <button onclick="verRutina(${rutina.id})" class="btn-ver">👁 Ver</button>
                    <button onclick="eliminarRutina(${rutina.id})" class="btn-delete">🗑 Eliminar</button>
                </div>
            </div>
        `;
    });

    actualizarPaginaUI();
}

/* ===================== VER ===================== */
async function verPlan(id){
    const res = await fetch(`${API}/planes/${id}`);
    const plan = await res.json();
    document.getElementById("visor").innerHTML = plan.html;
}

async function verRutina(id){
    const res = await fetch(`${API}/rutinas/${id}`);
    const rutina = await res.json();
    document.getElementById("visor").innerHTML = rutina.rutinaHtml;
}

/* ===================== ELIMINAR ===================== */
async function eliminarPlan(id){
    if (!confirm("¿Eliminar plan?")) return;

    await fetch(`${API}/planes/${id}`, { method: "DELETE" });

    cargarTodo(paginaActual);
}

async function eliminarRutina(id){
    if (!confirm("¿Eliminar rutina?")) return;

    await fetch(`${API}/rutinas/${id}`, { method: "DELETE" });

    cargarTodo(paginaActual);
}

/* ===================== BUSCAR ===================== */
async function buscar(){
    let q = document.getElementById("busqueda").value;

    if(q === ""){
        cargarTodo(paginaActual);
        return;
    }

    const contenedor = document.getElementById("contenedor-global");
    contenedor.innerHTML = "";

    try{
        const [planesRes, rutinasRes] = await Promise.all([
            fetch(`${API}/planes/buscar?q=${q}`),
            fetch(`${API}/rutinas/${q}`)
        ]);

        /* PLANES */
        const planes = await planesRes.json();
        planes.forEach(plan => {
            contenedor.innerHTML += `
                <div class="dieta-card">
                    <h3 style="color:#d4af37;">📋 ${plan.cliente?.nombre || "Sin nombre"}</h3>

                    <div class="acciones">
                        <button onclick="verPlan(${plan.id})" class="btn-ver">👁 Ver</button>
                        <button onclick="eliminarPlan(${plan.id})" class="btn-delete">🗑 Eliminar</button>
                    </div>
                </div>
            `;
        });

        /* RUTINA POR ID */
        if(rutinasRes.ok){
            const rutina = await rutinasRes.json();

            if(rutina && rutina.id){
                contenedor.innerHTML += `
                    <div class="dieta-card">
                        <h3 style="color:#4dd0e1;">🏋️ ${rutina.cliente?.nombre || "Sin nombre"}</h3>

                        <div class="acciones">
                            <button onclick="verRutina(${rutina.id})" class="btn-ver">👁 Ver</button>
                            <button onclick="eliminarRutina(${rutina.id})" class="btn-delete">🗑 Eliminar</button>
                        </div>
                    </div>
                `;
            }
        }

    }catch(e){
        console.error(e);
    }
}

/* ===================== PAGINACION ===================== */
function paginaSiguiente(){
    if(paginaActual < totalPaginas - 1){
        paginaActual++;
        cargarTodo(paginaActual);
    }
}

function paginaAnterior(){
    if(paginaActual > 0){
        paginaActual--;
        cargarTodo(paginaActual);
    }
}

function actualizarPaginaUI(){
    document.getElementById("pagina-info").innerText =
        `Página ${paginaActual + 1}`;
}

/* ===================== INIT ===================== */
async function init(){
    await cargarTodo();
}

init();

/* ENTER BUSCAR */
document.getElementById("busqueda")
.addEventListener("keypress", function(e){
    if(e.key === "Enter") buscar();
});
</script>

</body>
</html>
