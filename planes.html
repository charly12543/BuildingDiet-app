<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planes - Charly Fitness</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- NAVBAR -->  
<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png" alt="Charly Fitness">
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
       <li><a href="index.html" class="btn-main">🥗 Inicio</a></li>     
    </ul>
  </div>
</nav> 

<!-- HERO -->
<section class="hero">
  <h1>📋 Planes generados</h1>
  <p>Administra, visualiza y elimina planes fácilmente</p>
</section>

<input type="text" id="busqueda" placeholder="Buscar por ID o nombre">

<!-- CONTENEDOR -->
<section>
  <div id="contenedor-planes" style="display:flex; flex-direction:column; gap:20px;"></div>

  <h2 style="margin-top:40px;">🏋️ Rutinas generadas</h2>
  <div id="contenedor-rutinas" style="display:flex; flex-direction:column; gap:20px;"></div>

  <h2 style="margin-top:40px;">👁️ Visor</h2>
  <div id="visor" style="background:#fff; color:#000; padding:20px; border-radius:10px;">
    Selecciona un plan o rutina
  </div>
</section>

<!-- PAGINACION -->
<div style="margin-top:20px;">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script>
const API = "http://localhost:8080/api";

/* ===================== VARIABLES ===================== */
let paginaActual = 0;
let totalPaginas = 0;

/* ===================== PLANES ===================== */
async function cargarPlanes(page = 0) {
    const res = await fetch(`${API}/planes?page=${page}&size=10`);
    const data = await res.json();

    totalPaginas = data.totalPages;

    const contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    data.content.forEach(plan => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3 style="color:#d4af37;">
                    ${plan.cliente?.nombre || "Sin nombre"}
                </h3>

                <p style="opacity:0.8;">
                    📅 ${plan.fecha}
                </p>

                <div style="margin-top:10px;">
                    🔥 ${plan.calorias || '-'} kcal |
                    🥩 ${plan.proteina || '-'} |
                    🍚 ${plan.carbos || '-'} |
                    🥑 ${plan.grasa || '-'}
                </div>

                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button onclick="verPlan(${plan.id})" class="btn-ver">
                        👁 Ver
                    </button>

                    <button onclick="eliminarPlan(${plan.id})" class="btn-delete">
                        🗑 Eliminar
                    </button>
                </div>
            </div>
        `;
    });

    actualizarPaginaUI();
}

/* ===================== RUTINAS ===================== */
async function cargarRutinas(page = 0) {
    const res = await fetch(`${API}/rutinas?page=${page}&size=10`);
    const data = await res.json();

    const contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    data.content.forEach(rutina => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3 style="color:#d4af37;">
                    ${rutina.cliente?.nombre || "Sin nombre"}
                </h3>

                <p style="opacity:0.8;">
                    🏋️ ${rutina.cliente?.diasGym || '-'} días
                </p>

                <div style="margin-top:15px; display:flex; gap:10px;">
                    <button onclick="verRutina(${rutina.id})" class="btn-ver">
                        👁 Ver
                    </button>

                    <button onclick="eliminarRutina(${rutina.id})" class="btn-delete">
                        🗑 Eliminar
                    </button>
                </div>
            </div>
        `;
    });
}

/* ===================== VER ===================== */
async function verPlan(id) {
    const res = await fetch(`${API}/planes/${id}`);
    const plan = await res.json();
    document.getElementById("visor").innerHTML = plan.html;
}

async function verRutina(id) {
    const res = await fetch(`${API}/rutinas/${id}`);
    const rutina = await res.json();
    document.getElementById("visor").innerHTML = rutina.rutinaHtml;
}

/* ===================== ELIMINAR ===================== */
async function eliminarPlan(id) {
    if (!confirm("¿Eliminar plan?")) return;

    await fetch(`${API}/planes/${id}`, { method: "DELETE" });
    cargarPlanes(paginaActual);
}

async function eliminarRutina(id) {
    if (!confirm("¿Eliminar rutina?")) return;

    await fetch(`${API}/rutinas/${id}`, { method: "DELETE" });
    cargarRutinas(paginaActual);
}

/* ===================== BUSCAR ===================== */
async function buscar(){
    let q = document.getElementById("busqueda").value;

    if(q === ""){
        cargarPlanes(paginaActual);
        return;
    }

    const res = await fetch(`${API}/planes/buscar?q=${q}`);
    const data = await res.json();

    const contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    data.forEach(plan => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3>${plan.cliente?.nombre}</h3>
                <button onclick="verPlan(${plan.id})">Ver</button>
            </div>
        `;
    });
}

/* ===================== PAGINACION ===================== */
function paginaSiguiente(){
    if(paginaActual < totalPaginas - 1){
        paginaActual++;
        cargarPlanes(paginaActual);
        cargarRutinas(paginaActual);
    }
}

function paginaAnterior(){
    if(paginaActual > 0){
        paginaActual--;
        cargarPlanes(paginaActual);
        cargarRutinas(paginaActual);
    }
}

function actualizarPaginaUI(){
    document.getElementById("pagina-info").innerText = `Página ${paginaActual + 1}`;
}

/* ===================== INIT ===================== */
async function init(){
    await cargarPlanes();
    await cargarRutinas();
}

init();

/* ===================== EVENTO ===================== */
document.getElementById("busqueda").addEventListener("input", buscar);

</script>

</body>
</html>
