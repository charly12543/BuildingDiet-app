<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Planes - Charly Fitness</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>
    <div class="menu-toggle">☰</div>
    <ul class="nav-links">
       <li><a href="index.html" class="btn-main">🥗 Inicio</a></li>     
    </ul>
  </div>
</nav> 

<section class="hero">
  <h1>📋 Panel de Planes</h1>
  <p>Modo profesional activado 🔥</p>
</section>

<!-- 🔥 TABS -->
<div class="tabs">
  <button class="tab-btn active" onclick="cambiarTab('dietas')">🥗 Dietas</button>
  <button class="tab-btn" onclick="cambiarTab('rutinas')">🏋️ Rutinas</button>
</div>

<!-- 🔍 BUSQUEDA -->
<div class="busqueda-box">
  <input type="text" id="busqueda" placeholder="Buscar por ID o nombre">
  <button onclick="buscar()">🔍 Buscar</button>
</div>

<section>

  <!-- DIETAS -->
  <div id="tab-dietas" class="tab-content">
    <div id="contenedor-dietas"></div>
  </div>

  <!-- RUTINAS -->
  <div id="tab-rutinas" class="tab-content" style="display:none;">
    <div id="contenedor-rutinas"></div>
  </div>

  <h2>👁️ Visor</h2>
  <div id="visor" class="visor-box">
    Selecciona un plan o rutina
  </div>

</section>

<!-- PAGINACION -->
<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script>
const API = "http://localhost:8080/api";

let paginaActual = 0;
let totalPaginasDietas = 0;
let totalPaginasRutinas = 0;
let tabActual = "dietas";

/* ===================== CAMBIAR TAB ===================== */
function cambiarTab(tab){

  tabActual = tab;

  document.getElementById("tab-dietas").style.display = tab === "dietas" ? "block" : "none";
  document.getElementById("tab-rutinas").style.display = tab === "rutinas" ? "block" : "none";

  document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
  event.target.classList.add("active");

  paginaActual = 0;

  if(tab === "dietas"){
    cargarDietas();
  }else{
    cargarRutinas();
  }
}

/* ===================== DIETAS ===================== */
async function cargarDietas(page = paginaActual){
    const res = await fetch(`${API}/planes?page=${page}&size=10`);
    const data = await res.json();

    totalPaginasDietas = data.totalPages;

    const contenedor = document.getElementById("contenedor-dietas");
    contenedor.innerHTML = "";

    data.content.forEach(plan => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3 style="color:#d4af37;">${plan.cliente?.nombre}</h3>
                <p>📅 ${plan.fecha}</p>

                <div class="acciones">
                    <button onclick="verPlan(${plan.id})" class="btn-ver">👁 Ver</button>
                    <button onclick="eliminarPlan(${plan.id})" class="btn-delete">🗑</button>
                </div>
            </div>
        `;
    });

    actualizarPaginaUI();
}

/* ===================== RUTINAS ===================== */
async function cargarRutinas(page = paginaActual){
    const res = await fetch(`${API}/rutinas?page=${page}&size=10`);
    const data = await res.json();

    totalPaginasRutinas = data.totalPages;

    const contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    data.content.forEach(rutina => {
        contenedor.innerHTML += `
            <div class="dieta-card">
                <h3 style="color:#4dd0e1;">${rutina.cliente?.nombre}</h3>
                <p>🏋️ ${rutina.cliente?.diasGym || '-'} días</p>

                <div class="acciones">
                    <button onclick="verRutina(${rutina.id})" class="btn-ver">Ver rutina</button>
                    <button onclick="eliminarRutina(${rutina.id})" class="btn-delete">🗑</button>
                </div>
            </div>
        `;
    });

    actualizarPaginaUI();
}

/* ===================== VER ===================== */
async function verPlan(id){
    const res = await fetch(`${API}/planes/${id}`);
    const plan = await res.json();
    document.getElementById("visor").innerHTML = plan.html;
}

async function verRutina(id){
    const res = await fetch(`${API}/rutinas/${id}`);
    const rutina = await res.json();
    document.getElementById("visor").innerHTML = rutina.rutinaHtml;
}

/* ===================== ELIMINAR ===================== */
async function eliminarPlan(id){
    if (!confirm("¿Eliminar plan?")) return;
    await fetch(`${API}/planes/${id}`, { method: "DELETE" });
    cargarDietas();
}

async function eliminarRutina(id){
    if (!confirm("¿Eliminar rutina?")) return;
    await fetch(`${API}/rutinas/${id}`, { method: "DELETE" });
    cargarRutinas();
}

/* ===================== BUSCAR ===================== */
async function buscar(){
    let q = document.getElementById("busqueda").value;

    if(q === ""){
        tabActual === "dietas" ? cargarDietas() : cargarRutinas();
        return;
    }

    if(tabActual === "dietas"){
        const res = await fetch(`${API}/planes/buscar?q=${q}`);
        const data = await res.json();

        const contenedor = document.getElementById("contenedor-dietas");
        contenedor.innerHTML = "";

        data.forEach(plan => {
            contenedor.innerHTML += `
                <div class="dieta-card">
                    <h3>${plan.cliente?.nombre}</h3>
                    <button onclick="verPlan(${plan.id})" class="btn-ver">Ver</button>
                </div>
            `;
        });

    }else{
        const res = await fetch(`${API}/rutinas?page=0&size=50`);
        const data = await res.json();

        const contenedor = document.getElementById("contenedor-rutinas");
        contenedor.innerHTML = "";

        data.content
        .filter(r => r.cliente?.nombre?.toLowerCase().includes(q.toLowerCase()))
        .forEach(rutina => {
            contenedor.innerHTML += `
                <div class="dieta-card">
                    <h3>${rutina.cliente?.nombre}</h3>
                    <button onclick="verRutina(${rutina.id})" class="btn-ver">Ver rutina</button>
                </div>
            `;
        });
    }
}

/* ===================== PAGINACION ===================== */
function paginaSiguiente(){
    if(tabActual === "dietas"){
        if(paginaActual < totalPaginasDietas - 1){
            paginaActual++;
            cargarDietas();
        }
    }else{
        if(paginaActual < totalPaginasRutinas - 1){
            paginaActual++;
            cargarRutinas();
        }
    }
}

function paginaAnterior(){
    if(paginaActual > 0){
        paginaActual--;

        tabActual === "dietas"
            ? cargarDietas()
            : cargarRutinas();
    }
}

function actualizarPaginaUI(){
    document.getElementById("pagina-info").innerText =
        `Página ${paginaActual + 1}`;
}

/* ===================== INIT ===================== */
async function init(){
    await cargarDietas();
}

init();

/* ENTER BUSCAR */
document.getElementById("busqueda")
.addEventListener("keypress", function(e){
    if(e.key === "Enter") buscar();
});
</script>

</body>
</html>
