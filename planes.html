<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Planes - Charly Fitness</title>
<link rel="stylesheet" href="style.css">

<script>
if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}

function getAuthHeaders() {
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "login.html";
    return {};
  }

  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + token
  };
}
</script>
</head>

<body>

<nav class="navbar">
  <div class="nav-container">
    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">🏠 Inicio</a></li>
      <li><button onclick="logout()" class="btn-delete">Salir</button></li>
    </ul>
  </div>
</nav>

<section class="hero">
  <h1>📋 Panel de Planes</h1>
</section>

<div class="tabs">
  <button onclick="mostrarDietas()" id="btnDietas" class="tab-btn active">📋 Dietas</button>
  <button onclick="mostrarRutinas()" id="btnRutinas" class="tab-btn">🏋️ Rutinas</button>
</div>

<div class="busqueda-box">
  <input type="text" id="busqueda" placeholder="Buscar cliente...">
  <button onclick="buscar()">🔍</button>
</div>

<section>

<div id="seccion-dietas">
  <div id="contenedor-planes"></div>
</div>

<div id="seccion-rutinas" style="display:none;">
  <div id="contenedor-rutinas"></div>
</div>

<h2>👁️ Visor</h2>
<div id="visor" class="visor-box"></div>

<button onclick="exportarPDF()" class="btn-ver">
📄 Exportar PDF
</button>

</section>

<div class="paginacion">
  <button onclick="paginaAnterior()">⬅</button>
  <span id="pagina-info">Página 1</span>
  <button onclick="paginaSiguiente()">➡</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const LOCAL_API = "http://localhost:8080/api";
const PROD_API = "https://nutrition-backend-1-f2co.onrender.com/api";

let API = LOCAL_API;

async function initAPI(){
  try {
    const res = await fetch(PROD_API + "/health");
    if(res.ok){
      API = PROD_API;
      console.log("🌍 Usando PROD");
      return;
    }
  } catch(e){}

  API = LOCAL_API;
  console.log("💻 Usando LOCAL");
}
</script>

<script>
let paginaActual = 0;
let totalPaginas = 0;
let vistaActual = "dietas";

/* TABS */
function activarTab(activo){
  document.getElementById("btnDietas").classList.remove("active");
  document.getElementById("btnRutinas").classList.remove("active");
  activo.classList.add("active");
}

function mostrarDietas(){
  vistaActual = "dietas";
  paginaActual = 0;

  activarTab(document.getElementById("btnDietas"));

  document.getElementById("seccion-dietas").style.display="block";
  document.getElementById("seccion-rutinas").style.display="none";
  document.getElementById("visor").innerHTML = "";

  cargarPlanes();
}

function mostrarRutinas(){
  vistaActual = "rutinas";
  paginaActual = 0;

  activarTab(document.getElementById("btnRutinas"));

  document.getElementById("seccion-dietas").style.display="none";
  document.getElementById("seccion-rutinas").style.display="block";
  document.getElementById("visor").innerHTML = "";

  cargarRutinas();
}

/* PLANES */
async function cargarPlanes(page = 0){
  try{
    const res = await fetch(`${API}/planes?page=${page}&size=5`, {
      headers: getAuthHeaders()
    });

    if(!res.ok){
      const text = await res.text();
      console.error("❌ ERROR BACK:", text);
      document.getElementById("contenedor-planes").innerHTML =
        "<p>❌ Error cargando planes</p>";
      return;
    }

    const data = await res.json();
    totalPaginas = data.totalPages || 0;

    const contenedor = document.getElementById("contenedor-planes");
    contenedor.innerHTML = "";

    if(!data.content || data.content.length === 0){
      contenedor.innerHTML = "<p>⚠ No hay planes registrados</p>";
      return;
    }

    data.content.forEach(plan => {
      contenedor.innerHTML += `
      <div class="dieta-card">
        <h3>${plan.cliente?.nombre || "Sin nombre"}</h3>
        <p>${plan.fecha || ""}</p>
        <div class="acciones">
          <button class="btn-ver" onclick="verPlan(${plan.id})">👁 Ver</button>
          <button class="btn-ver" onclick="editarPlan(${plan.id})">✏️ Editar</button>
          <button class="btn-delete" onclick="eliminarPlan(${plan.id})">🗑</button>
        </div>
      </div>`;
    });

    actualizarPaginaUI();

  } catch(error){
    console.error(error);
  }
}

/* RUTINAS */
async function cargarRutinas(page = 0){
  try{
    const res = await fetch(`${API}/rutinas?page=${page}&size=5`, {
      headers: getAuthHeaders()
    });

    if(!res.ok){
      const text = await res.text();
      console.error(text);
      return;
    }

    const data = await res.json();
    totalPaginas = data.totalPages || 0;

    const contenedor = document.getElementById("contenedor-rutinas");
    contenedor.innerHTML = "";

    if (!data.content || data.content.length === 0) {
      contenedor.innerHTML = "<p>⚠ No hay rutinas</p>";
      return;
    }

    data.content.forEach(r => {
      contenedor.innerHTML += `
      <div class="dieta-card">
        <h3>${r.cliente?.nombre || "Sin nombre"}</h3>
        <p>${r.fecha || ""}</p>
        <div class="acciones">
          <button class="btn-ver" onclick="verRutina(${r.id})">👁 Ver</button>
          <button class="btn-ver" onclick="editarRutina(${r.id})">✏️ Editar</button>
          <button class="btn-delete" onclick="eliminarRutina(${r.id})">🗑</button>
        </div>
      </div>`;
    });

    actualizarPaginaUI();

  } catch(error){
    console.error(error);
  }
}

/* VER */
async function verPlan(id){
  const res = await fetch(`${API}/planes/${id}`, {
    headers: getAuthHeaders()
  });

  const data = await res.json();
  document.getElementById("visor").innerHTML = data.html || "<p>❌ No hay dieta</p>";
}

async function verRutina(id){
  const res = await fetch(`${API}/rutinas/${id}`, {
    headers: getAuthHeaders()
  });

  const data = await res.json();
  document.getElementById("visor").innerHTML = data.rutinaHtml || "<p>❌ Sin rutina</p>";
}

/* DELETE */
async function eliminarPlan(id){
  if(!confirm("¿Seguro?")) return;

  await fetch(`${API}/planes/${id}`, {
    method:"DELETE",
    headers: getAuthHeaders()
  });

  cargarPlanes();
}

async function eliminarRutina(id){
  if(!confirm("¿Seguro?")) return;

  await fetch(`${API}/rutinas/${id}`, {
    method:"DELETE",
    headers: getAuthHeaders()
  });

  cargarRutinas();
}

/* PAGINACION */
function paginaSiguiente(){
  if(paginaActual < totalPaginas-1){
    paginaActual++;
    vistaActual==="dietas" ? cargarPlanes(paginaActual) : cargarRutinas(paginaActual);
  }
}

function paginaAnterior(){
  if(paginaActual > 0){
    paginaActual--;
    vistaActual==="dietas" ? cargarPlanes(paginaActual) : cargarRutinas(paginaActual);
  }
}

function actualizarPaginaUI(){
  document.getElementById("pagina-info").innerText =
    `Página ${paginaActual + 1}`;
}

/* INIT */
(async () => {
  await initAPI();
  mostrarDietas();
})();

/* LOGOUT */
function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}
</script>

</body>
</html>
