<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Admin - Usuarios</title>
<link rel="stylesheet" href="style.css">

<script>
if(!localStorage.getItem("token")){
  window.location.href = "login.html";
}

function getAuthHeaders(){
  return {
    "Content-Type": "application/json",
    "Authorization": "Bearer " + localStorage.getItem("token")
  };
}

async function fetchAuth(url, options = {}){
  const res = await fetch(url, {
    ...options,
    headers: {
      ...getAuthHeaders(),
      ...(options.headers || {})
    }
  });

  if(res.status === 401){
    localStorage.clear();
    alert("Sesión expirada 🔐");
    window.location.href = "login.html";
    return null;
  }

  return res;
}
</script>

</head>
<body>

<!-- NAVBAR (igual que tu app) -->
<nav class="navbar">
  <div class="nav-container">

    <a href="index.html" class="logo">
      <img src="images/logoGitHub.png">
    </a>

    <div class="menu-toggle" onclick="toggleMenu()">☰</div>

    <ul class="nav-links" id="navLinks">
      <li><a href="index.html">🏠 Inicio</a></li>
      <li><button onclick="logout()" class="btn-delete">Salir</button></li>
    </ul>

  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>👑 Panel de Administración</h1>
  <p>Gestión de usuarios del sistema</p>
</section>

<section>

<!-- 🔥 FORM PRO -->
<div class="lead-box">

  <h2>➕ Crear Usuario</h2>

  <input id="usuario" placeholder="Usuario">
  <input id="password" placeholder="Password" type="password">

  <select id="rol">
    <option value="COACH">COACH</option>
    <option value="ADMIN">ADMIN</option>
  </select>

  <button class="btn-ver" onclick="crear()">Crear Usuario</button>

</div>

<!-- 🔥 LISTA -->
<h2 style="text-align:center; margin-top:40px;">👥 Usuarios</h2>

<div id="lista"></div>

</section>

<script>

const API = "https://nutrition-backend-1-f2co.onrender.com/api";

async function cargar(){

  const res = await fetchAuth(API + "/admin/usuarios");
  if(!res) return;

  const data = await res.json();

  let html = "";

  data.forEach(u=>{
    html += `
      <div class="dieta-card">

        <h3>👤 ${u.usuario}</h3>

        <p><strong>Rol:</strong> ${u.rol}</p>

        <div class="acciones">
          <button class="btn-delete" onclick="eliminar(${u.id})">Eliminar</button>
        </div>

      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

async function crear(){

  const usuario = document.getElementById("usuario").value;
  const password = document.getElementById("password").value;
  const rol = document.getElementById("rol").value;

  if(!usuario || !password){
    alert("Completa los campos bro");
    return;
  }

  await fetchAuth(API + "/admin/usuarios", {
    method:"POST",
    body: JSON.stringify({usuario,password,rol})
  });

  document.getElementById("usuario").value = "";
  document.getElementById("password").value = "";

  cargar();
}

async function eliminar(id){

  if(!confirm("¿Eliminar usuario?")) return;

  await fetchAuth(API + "/admin/usuarios/" + id, {
    method:"DELETE"
  });

  cargar();
}

function logout(){
  localStorage.removeItem("token");
  window.location.href = "login.html";
}

function toggleMenu(){
  document.getElementById("navLinks").classList.toggle("active");
}

cargar();

</script>

</body>
</html>
